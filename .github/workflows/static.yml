# 部署指定 HTML 文件到 GitHub Pages（简化路径）
name: Deploy static content to Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: 准备部署目录（仅复制指定文件，路径简化）
        run: |
          mkdir deploy
          cp MirageShell/gopher-post/gopher-post.html deploy/gopher-post.html
          cp MirageShell/PhishingInfoParser/PhishingInfoParser.html deploy/PhishingInfoParser.html
          # 如果你的 HTML 引用了同目录下的 CSS/JS/图片，也需要复制过来
          # 例如：
          # cp MirageShell/gopher-post/style.css deploy/
          # cp MirageShell/PhishingInfoParser/script.js deploy/

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './deploy'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
