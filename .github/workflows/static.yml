name: Deploy static content to Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: 准备部署目录
        run: |
          mkdir deploy
          # 复制首页
          cp index.html deploy/index.html
          # 复制工具页面（根据你仓库的实际路径调整）
          cp gopher-post/gopher-post.html deploy/gopher-post.html
          cp PhishingInfoParser/PhishingInfoParser.html deploy/PhishingInfoParser.html
          # 可选：列出文件确认
          ls -la deploy

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './deploy'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
