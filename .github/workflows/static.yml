name: Deploy static content to Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: 调试 - 列出仓库文件结构
        run: |
          echo "=== 仓库根目录内容 ==="
          ls -la
          echo ""
          echo "=== gopher-post 目录 ==="
          ls -la gopher-post || echo "目录不存在"
          echo ""
          echo "=== PhishingInfoParser 目录 ==="
          ls -la PhishingInfoParser || echo "目录不存在"

      - name: 准备部署目录
        run: |
          mkdir deploy
          cp gopher-post/gopher-post.html deploy/gopher-post.html
          cp PhishingInfoParser/PhishingInfoParser.html deploy/PhishingInfoParser.html
          echo "=== deploy 目录内容 ==="
          ls -la deploy

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './deploy'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
